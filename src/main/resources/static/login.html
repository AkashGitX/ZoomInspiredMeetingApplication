<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — ZoomMeet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-shell">
        <div class="auth-brand">
            <div class="logo" aria-hidden="true">◉</div>
            <h1>ZoomMeet</h1>
            <p>Sign in with your email and password</p>
        </div>
        <div class="glass-card">
            <form id="loginForm" novalidate>
                <div class="form-field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@company.com" required autocomplete="username" inputmode="email">
                </div>
                <div class="form-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Your password" required autocomplete="current-password">
                </div>
                <p id="loginError" class="form-error" role="alert"></p>
                <button type="submit" class="btn-primary">Sign in</button>
            </form>
        </div>
        <p class="auth-footer">New here? <a href="register.html">Create an account</a></p>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
