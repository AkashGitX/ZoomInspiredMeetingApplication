spring.application.name=ZoomClonespring.application.name=ZoomInspiredMeetingApplication

# --- PostgreSQL datasource ---
spring.datasource.url=jdbc:postgresql://localhost:5432/zoom
spring.datasource.username=postgres
spring.datasource.password=0983
spring.datasource.driver-class-name=org.postgresql.Driver


spring.jpa.hibernate.ddl-auto=update

# Dialect: optional with Hibernate 6+ (often auto-detected from JDBC); explicit is fine for clarity.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Default schema (matches PostgreSQL public; change if you use another schema)
spring.jpa.properties.hibernate.default_schema=public

# Surface schema-update problems in logs during development (raise to WARN or disable in production)
logging.level.org.hibernate.tool.schema=WARN

# JWT (HS256)
app.jwt.secret-key=${APP_JWT_SECRET:ZoomMeetingJwtSecretKey_ChangeInProd_Min32Chars!!}
app.jwt.expiration-ms=86400000

